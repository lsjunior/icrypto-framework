---
name: Publish package to GitHub Packages
on:
  #release:
  #  types: [created]
  push:
    branches:
      - main
    #tags:
    #  - v**
jobs:
  # https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-java-packages-with-maven#publishing-packages-to-the-maven-central-repository
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      # https://github.com/actions/checkout/tags
      # https://github.com/actions/setup-java/tags
      - uses: actions/checkout@v4
      - name: Configure Git User
        run: |
          git config --global user.name "Lourival Sabino(Github Actions)"
          git config --global user.email "lourival.sabino.junior@gmail.com"
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and release
        run: |
          mvn --batch-mode release:prepare
          mvn --batch-mode release:perform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
